name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    env:
      # Ajustando caminhos para o seu usuário no macOS
      HOME: /Users/pepa
      # Onde o ESP-IDF guardará as ferramentas no seu Mac
      IDF_TOOLS_PATH: /Users/pepa/esp-idf-tools
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # Já clona submodulos automaticamente

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install ESP-IDF prerequisite (macOS)
        run: |
          # No Mac usamos brew, não apt-get
          brew install cmake ninja d-bus ccache dfu-util wget
          python3 -m pip install --upgrade pip
          python3 -m pip install pyserial

      - name: Download ESP-IDF
        run: |
          # Evita baixar se já existir para poupar banda no seu Mac
          if [ ! -d "esp-idf" ]; then
            git clone --recursive --branch v5.0 https://github.com/espressif/esp-idf.git ./esp-idf
          fi

      - name: Install ESP-IDF
        working-directory: ./esp-idf
        run: |
          # Criando a pasta do tools_path antes
          mkdir -p $IDF_TOOLS_PATH
          sh ./install.sh esp32

      - name: Preparing release Folder
        run: |
          mkdir -p tmp_files
          mkdir -p release/update

      - name: Build Switch Mode with ESP-IDF
        working-directory: ./n64-switch
        run: |
          . ../esp-idf/export.sh
          idf.py build
          cp build/n64-control-switch.bin ../tmp_files/
          cp build/ota_data_initial.bin ../tmp_files/
          cp build/bootloader/bootloader.bin ../tmp_files/
          cp build/partition_table/partition-table.bin ../tmp_files/

      - name: Build BlueRetro Mode with ESP-IDF
        working-directory: ./n64-blueretro
        run: |
          . ../esp-idf/export.sh
          idf.py build
          cp build/n64-control-blueretro.bin ../tmp_files/

      - name: Merge ready-to-flash binary file
        working-directory: ./tmp_files
        run: |
          . ../esp-idf/export.sh
          esptool.py --chip esp32 merge_bin -o BluN64.bin \
                                        0x1000 bootloader.bin \
                                        0x8000 partition-table.bin \
                                        0xd000 ota_data_initial.bin \
                                        0x10000 n64-control-switch.bin \
                                        0x110000 n64-control-blueretro.bin
          mv BluN64.bin ../release/BluN64.bin

      - name: Upload binary file
        uses: actions/upload-artifact@v4
        with:
          name: BebopCORE-ESP32
          path: release/BluN64.bin
          if-no-files-found: error
